name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          retention-days: 30

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install, lint, test, and build
        run: |
          npm ci
          npm run lint
          npm test --if-present
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 2222 -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync & atomic swap
        run: |
          rsync -az --delete-after dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/incoming/$GITHUB_SHA
          ssh -p 2222 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "bash /usr/local/bin/swap_symlink.sh $GITHUB_SHA"
